<h1>时间戳转换器</h1>
<p>在 Unix 时间戳与可读日期之间双向转换，并显示实时当前时间戳，开发与客服办公常用。</p>

<p>Unix 时间戳 ⇄ 日期 转换：</p>
<p>当前时间戳：<b id="now" style="color:#1a73e8"></b></p>
<input id="ts" placeholder="输入时间戳(秒)"><button onclick="t2d()">→ 转日期</button>
<input id="dt" type="datetime-local"><button onclick="d2t()">→ 转时间戳</button>
<div id="out" style="font-weight:600"></div>
<script>
var out=document.getElementById('out');
function t2d(){var v=+document.getElementById('ts').value;if(!v)return;out.textContent=new Date((''+v).length>10?v:v*1000).toLocaleString('zh-CN')}
function d2t(){var v=document.getElementById('dt').value;if(!v)return;out.textContent=Math.floor(new Date(v).getTime()/1000)+' 秒'}
setInterval(function(){document.getElementById('now').textContent=Math.floor(Date.now()/1000)},1000);
</script>
